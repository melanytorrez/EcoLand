<aside class="w-72 bg-gradient-to-b from-[#2E7D32] to-[#1B5E20] text-white flex flex-col min-h-screen sticky top-0">
  <div class="p-6 border-b border-white/10">
    <a routerLink="/admin" class="flex items-center gap-3">
      <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-lg">
        <lucide-icon name="leaf" class="w-7 h-7 text-[#2E7D32]"></lucide-icon>
      </div>
      <div>
        <h1 class="text-xl font-bold">EcoLand</h1>
        <p class="text-xs text-[#A5D6A7]">{{ 'admin_page.side_bar.logo.subtitle' | translate }}</p>
      </div>
    </a>
  </div>
  <!-- Navigation -->
  <nav class="flex-1 p-4 space-y-2">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      [class]="'flex items-center gap-3 px-4 py-3 rounded-2xl transition-all cursor-pointer ' + (router.url === item.path || router.url.startsWith(item.path) && item.path !== '/admin' ? 'bg-white text-[#2E7D32] shadow-lg' : 'text-[#A5D6A7] hover:bg-white/10 hover:text-white')"
    >
      <lucide-icon [name]="item.icon" class="w-5 h-5"></lucide-icon>
      <span class="font-medium">{{ item.label | translate }}</span>
    </a>
  </nav>

  <!-- User Section -->
  <div class="p-4 border-t border-white/10 mt-auto">
    <a
      routerLink="/"
      class="flex items-center gap-3 px-4 py-3 text-[#A5D6A7] hover:bg-white/10 hover:text-white rounded-2xl transition-all cursor-pointer"
    >
      <lucide-icon name="log-out" class="w-5 h-5"></lucide-icon>
      <span class="font-medium">{{ 'admin_page.side_bar.user_view' | translate }}</span>
    </a>
  </div>
</aside>
