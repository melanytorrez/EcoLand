<header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3 group">
        <div class="w-12 h-12 bg-gradient-to-br from-[#2E7D32] to-[#4CAF50] rounded-2xl flex items-center justify-center shadow-lg group-hover:shadow-xl transition-shadow">
          <lucide-icon name="leaf" class="w-7 h-7 text-white"></lucide-icon>
        </div>
        <span class="text-2xl font-bold bg-gradient-to-r from-[#2E7D32] to-[#4CAF50] bg-clip-text text-transparent">
          EcoLand
        </span>
      </a>

      <!-- Navigation -->
      <nav class="hidden md:flex items-center gap-8">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          class="text-base font-medium transition-colors relative"
          [ngClass]="currentPath === item.path ? 'text-[#2E7D32]' : 'text-gray-600 hover:text-[#4CAF50]'"
        >
          {{ item.label | translate }}
          <span *ngIf="currentPath === item.path" class="absolute -bottom-[21px] left-0 right-0 h-0.5 bg-gradient-to-r from-[#2E7D32] to-[#4CAF50]"></span>
        </a>
      </nav>

      <!-- Auth Buttons and Language Switcher -->
      <div class="flex items-center gap-3">
        <!-- Language Switcher -->
        <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-xl mr-2">
          <button 
            (click)="switchLanguage('es')"
            [ngClass]="currentLang === 'es' ? 'bg-white shadow-sm text-[#2E7D32] font-semibold' : 'text-gray-500 hover:text-gray-700'"
            class="px-3 py-1.5 text-sm rounded-lg transition-all">
            ES
          </button>
          <button 
            (click)="switchLanguage('en')"
            [ngClass]="currentLang === 'en' ? 'bg-white shadow-sm text-[#2E7D32] font-semibold' : 'text-gray-500 hover:text-gray-700'"
            class="px-3 py-1.5 text-sm rounded-lg transition-all">
            EN
          </button>
        </div>

        <ng-container *ngIf="isAuthenticated; else loginButtons">
            <!-- Admin View Button -->
            <a
              *ngIf="isAdmin"
              routerLink="/admin"
              class="hidden md:flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-purple-600 to-purple-700 text-white rounded-2xl hover:shadow-lg hover:shadow-purple-500/30 transition-all font-semibold"
            >
              <lucide-icon name="shield" class="w-4 h-4"></lucide-icon>
              {{ 'navigation.admin' | translate }}
            </a>
          
          <!-- User Info -->
          <div class="hidden md:flex items-center gap-2 px-4 py-2.5 bg-[#E8F5E9] rounded-2xl">
            <lucide-icon name="user" class="w-4 h-4 text-[#2E7D32]"></lucide-icon>
            <span class="text-sm font-medium text-[#2E7D32]">{{ user?.nombre || user?.email || user?.sub || ('auth.roleUser' | translate) }}</span>
          </div>

          <!-- Logout Button -->
          <button
            (click)="logout()"
            class="flex items-center gap-2 px-5 py-2.5 text-gray-600 hover:bg-gray-100 rounded-2xl transition-all"
          >
            <lucide-icon name="log-out" class="w-4 h-4"></lucide-icon>
            {{ 'navigation.logout' | translate }}
          </button>
        </ng-container>

        <ng-template #loginButtons>
          <a
            routerLink="/login"
            class="hidden md:flex items-center gap-2 px-5 py-2.5 text-[#2E7D32] hover:bg-[#E8F5E9] rounded-2xl transition-all"
          >
            <lucide-icon name="log-in" class="w-4 h-4"></lucide-icon>
            {{ 'auth.loginButton' | translate }}
          </a>
          <a
            routerLink="/register"
            class="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-[#2E7D32] to-[#4CAF50] text-white rounded-2xl hover:shadow-lg hover:shadow-[#4CAF50]/30 transition-all"
          >
            <lucide-icon name="user-plus" class="w-4 h-4"></lucide-icon>
            {{ 'auth.registerButton' | translate }}
          </a>
        </ng-template>
      </div>
    </div>
  </div>
</header>

<!-- Logout Confirmation Modal -->
<div *ngIf="showLogoutModal" 
     style="position: fixed; inset: 0; z-index: 999999; display: flex; align-items: center; justify-content: center; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px);">
  
  <div style="background-color: white; border-radius: 24px; padding: 24px; width: 90%; max-width: 260px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 1px solid #e5e7eb; position: relative;">
    
    <!-- Icon -->
    <div style="width: 48px; height: 48px; background-color: #fef2f2; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
      <lucide-icon name="log-out" style="width: 24px; height: 24px; color: #dc2626;"></lucide-icon>
    </div>
    
    <h3 style="font-size: 1.125rem; font-weight: 700; text-align: center; color: #111827; margin: 0 0 8px 0;">¿Cerrar sesión?</h3>
    <p style="font-size: 0.8rem; text-align: center; color: #6b7280; margin: 0 0 20px 0;">¿Estás seguro de salir?</p>
    
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <!-- Main Action (Aceptar) -->
      <button 
        (click)="confirmLogout()"
        style="width: 100%; padding: 10px; background-color: #dc2626; color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 0.875rem; cursor: pointer;">
        Sí, salir
      </button>
      <!-- Secondary Action (Cancelar) -->
      <button 
        (click)="cancelLogout()"
        style="width: 100%; padding: 10px; background-color: white; color: #4b5563; border: 1px solid #d1d5db; border-radius: 12px; font-weight: 600; font-size: 0.875rem; cursor: pointer;">
        Cancelar
      </button>
    </div>
    
  </div>
</div>
