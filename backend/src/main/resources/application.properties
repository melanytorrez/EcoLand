# Profile management
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ecoland_db
spring.datasource.username=root
spring.datasource.password=Diana112003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8082

# Logging
logging.level.org.springframework.security=DEBUG

# --- LOGGING CONFIGURATION ---
# UbicaciÃ³n y nombre del archivo de log
logging.file.name=logs/ecoland.log

# Formato de los logs en la consola y en el archivo
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss, America/Bogota} - %msg%n
# logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss, America/Bogota} [%thread] %-5level %logger{36} - %msg%n



# Niveles de Log
# Ponemos nuestro paquete principal en DEBUG para ver todo lo que pasa en nuestra lÃ³gica
logging.level.com.ecoland=DEBUG
# El resto de Spring lo mantenemos en INFO para mayor claridad
logging.level.root=INFO
