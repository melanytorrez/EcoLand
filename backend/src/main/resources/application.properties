# Profile management
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3308/ecoland_db
spring.datasource.username=root
spring.datasource.password=Diana112003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8082

# JWT Security - La clave se lee de la variable de entorno JWT_SECRET
jwt.secret=${JWT_SECRET:default-dev-secret-key-change-in-prod-32chars!}

# Logging
logging.level.org.springframework.security=DEBUG

# --- LOGGING CONFIGURATION ---
# Ubicacion y nombre del archivo de log
logging.file.name=logs/ecoland.log

# Formato de los logs en la consola y en el archivo
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss, America/Bogota} - %msg%n
# logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss, America/Bogota} [%thread] %-5level %logger{36} - %msg%n



# Niveles de Log
# Ponemos nuestro paquete principal en DEBUG para ver todo lo que pasa en nuestra logica
logging.level.com.ecoland=DEBUG
# El resto de Spring lo mantenemos en INFO para mayor claridad
logging.level.root=INFO

# --- FEATURE TOGGLES ---
# Activar o desactivar modulos de la aplicacion
# Mantenemos las funcionalidades actuales activas por defecto para no romper el flujo
features.toggles.STATISTICS=true
features.toggles.RECYCLING=true
features.toggles.REFORESTATION=true
features.toggles.TEST_FEATURE=false
