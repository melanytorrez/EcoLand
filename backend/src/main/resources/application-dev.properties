# Local development profile without external MySQL
spring.datasource.url=jdbc:h2:mem:ecoland_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Keep schema lifecycle predictable for local runs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console for quick data inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security logs can stay verbose in development
logging.level.org.springframework.security=DEBUG
