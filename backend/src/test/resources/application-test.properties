# Test configuration - in-memory database
spring.datasource.url=jdbc:h2:mem:ecoland_test_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA - H2 in MySQL compatibility mode
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Security para tests
jwt.secret=test-secret-key-that-is-at-least-32-characters-long
